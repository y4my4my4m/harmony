# =============================================================================
# Harmony - All-in-one self-host stack
# =============================================================================
# One command brings up EVERYTHING: a trimmed Supabase, the Harmony frontend,
# federation backend, Redis, and a Caddy reverse proxy with automatic HTTPS.
#
#   1.  bash configure.sh        # interactive: generates .env + trims Supabase
#   2.  docker compose up -d     # builds + starts the whole stack
#
# To update later:  bash update.sh
#
# The Supabase services are pulled in via `include:` from ./supabase, which
# configure.sh provisions from the pinned upstream Supabase Docker stack with
# the edge-functions and connection-pooler services removed (Harmony needs
# neither). Everything shares one Docker network so service names resolve.
# =============================================================================

name: harmony

include:
  # Trimmed Supabase stack (db, kong, auth, rest, realtime, storage, imgproxy,
  # meta, and optional studio). Generated by configure.sh - do not edit by hand;
  # re-run configure.sh / update.sh to refresh it from upstream.
  - path: ./supabase/docker-compose.yml
    env_file: ./supabase/.env

services:
  # ---------------------------------------------------------------------------
  # Caddy - reverse proxy + automatic HTTPS (the only thing exposed publicly)
  # ---------------------------------------------------------------------------
  # Caddy obtains and renews Let's Encrypt certificates on its own (just needs
  # ports 80/443 reachable and valid DNS). For LAN/NAS use without public DNS,
  # set TLS_MODE=internal in .env and Caddy issues its own local CA cert.
  caddy:
    image: caddy:2-alpine
    container_name: harmony-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
      DB_DOMAIN: ${DB_DOMAIN:-db.${DOMAIN}}
      LIVEKIT_DOMAIN: ${LIVEKIT_DOMAIN:-live.${DOMAIN}}
      # Either a contact email (public ACME / Let's Encrypt) or the literal
      # word "internal" (Caddy's own CA, for LAN/NAS without public DNS).
      CADDY_TLS: ${CADDY_TLS:-internal}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - federation-server
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Frontend (Vue SPA) - built in-container so no host Node toolchain is needed
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: self-host/web.Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:?Set VITE_SUPABASE_URL in .env}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:?Set VITE_SUPABASE_ANON_KEY in .env}
        VITE_INSTANCE_DOMAIN: ${DOMAIN}
        VITE_INSTANCE_NAME: ${INSTANCE_NAME:-Harmony}
        VITE_DOMAIN: ${DOMAIN}
        VITE_APP_URL: https://${DOMAIN}
        VITE_FEDERATION_API_URL: https://${DOMAIN}
        VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL:-}
        VITE_ENABLE_FEDERATION: ${VITE_ENABLE_FEDERATION:-true}
        VITE_ENABLE_VOICE: ${VITE_ENABLE_VOICE:-true}
        VITE_ENABLE_E2E_ENCRYPTION: ${VITE_ENABLE_E2E_ENCRYPTION:-true}
    image: harmony-web:local
    container_name: harmony-web
    restart: unless-stopped
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Federation backend - split server + worker for process isolation
  # ---------------------------------------------------------------------------
  federation-server:
    build:
      context: ../federation-backend
      dockerfile: Dockerfile
    image: harmony-federation:local
    container_name: harmony-federation-server
    restart: unless-stopped
    env_file:
      - ./federation.env
    environment:
      NODE_ENV: production
      PORT: "3001"
      FEDERATION_MODE: server
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - default

  federation-worker:
    image: harmony-federation:local
    container_name: harmony-federation-worker
    restart: unless-stopped
    env_file:
      - ./federation.env
    environment:
      NODE_ENV: production
      FEDERATION_MODE: worker
    depends_on:
      redis:
        condition: service_healthy
      federation-server:
        condition: service_started
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Redis - BullMQ job queue, caching, presence, rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: harmony-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Bot gateway (optional) - enable with:  docker compose --profile bots up -d
  # ---------------------------------------------------------------------------
  bot-gateway:
    build:
      context: ../bot-gateway
      dockerfile: Dockerfile
    image: harmony-bot-gateway:local
    container_name: harmony-bot-gateway
    restart: unless-stopped
    env_file:
      - ./bot-gateway.env
    environment:
      NODE_ENV: production
      PORT: "3002"
    depends_on:
      - federation-server
    networks:
      - default
    profiles: [bots]

  # ---------------------------------------------------------------------------
  # LiveKit (optional voice/video) - enable with: docker compose --profile voice up -d
  # ---------------------------------------------------------------------------
  livekit:
    image: livekit/livekit-server:latest
    container_name: harmony-livekit
    restart: unless-stopped
    command: --config /livekit.yaml
    volumes:
      - ../webrtc/livekit.yaml:/livekit.yaml:ro
    ports:
      - "7881:7881"
      - "7882:7882/udp"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
    profiles: [voice]

volumes:
  caddy-data:
  caddy-config:
  redis-data:

networks:
  default:
    name: harmony
