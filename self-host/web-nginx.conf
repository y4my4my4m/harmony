# Static SPA server for the Harmony frontend container.
# TLS, federation routing, and compression are handled by the Caddy proxy in
# front of this container - this only serves the built Vue app with SPA fallback.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # PWA service worker must never be cached as immutable.
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /manifest.json {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Fingerprinted assets can be cached aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
