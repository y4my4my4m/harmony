# =============================================================================
# Harmony Nginx Configuration Template
# =============================================================================
# Copy this to nginx-harmony.conf and replace placeholders:
#   - YOUR_DOMAIN: Your domain (e.g., harmony.example.com)
#   - YOUR_EMAIL: Your email for Let's Encrypt
#   - /path/to/harmony: Path to your Harmony installation
#
# Then:
#   sudo cp nginx-harmony.conf /etc/nginx/sites-available/harmony
#   sudo ln -s /etc/nginx/sites-available/harmony /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d YOUR_DOMAIN
#   sudo systemctl reload nginx
# =============================================================================

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # SSL certificates (managed by Let's Encrypt/certbot)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==========================================================================
    # FEDERATION BACKEND
    # ==========================================================================

    # WebFinger discovery
    location = /.well-known/webfinger {
        proxy_pass http://localhost:3001/.well-known/webfinger;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
    }

    # host-meta (WebFinger discovery chain)
    location = /.well-known/host-meta {
        proxy_pass http://localhost:3001/.well-known/host-meta;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /.well-known/host-meta.json {
        proxy_pass http://localhost:3001/.well-known/host-meta.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=86400";
    }

    # NodeInfo discovery
    location = /.well-known/nodeinfo {
        proxy_pass http://localhost:3001/.well-known/nodeinfo;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
    }

    # NodeInfo 2.x
    location ~ ^/nodeinfo/2\.(0|1)$ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
    }

    # User Actor endpoints
    location ~ ^/users/[^/]+/(inbox|outbox|followers|following|featured)$ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept $http_accept;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Signature $http_signature;
        proxy_set_header Date $http_date;
        proxy_set_header Digest $http_digest;
    }

    # User Actor profile (content negotiation)
    location ~ ^/users/([^/]+)$ {
        set $username $1;
        set $target_action "redirect";

        if ($http_accept ~* "application/activity\+json") {
            set $target_action "proxy";
        }
        if ($http_accept ~* "application/ld\+json") {
            set $target_action "proxy";
        }
        if ($http_accept ~* "application/json") {
            set $target_action "proxy";
        }

        if ($target_action = "redirect") {
            return 302 /social/profile/$username;
        }

        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept $http_accept;
        proxy_set_header Signature $http_signature;
        proxy_set_header Date $http_date;
        proxy_set_header Digest $http_digest;
    }

    # Post endpoint - federation backend handles content negotiation:
    #  - ActivityPub clients (Accept: application/activity+json) → AP Note JSON
    #  - Browsers/crawlers → HTML page with OG meta tags for link previews
    location ~ ^/posts/([0-9a-f-]+)$ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept $http_accept;
        add_header Cache-Control "public, max-age=300";
    }

    # oEmbed endpoint for post embeds
    location = /oembed {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Post sub-collections (likes, replies) - always ActivityPub
    location ~ ^/posts/([0-9a-f-]+)/(likes|replies) {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept $http_accept;
        add_header Cache-Control "public, max-age=300";
    }
    
    # Server federation (Groups)
    location ~ ^/servers/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept $http_accept;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Signature $http_signature;
        proxy_set_header Date $http_date;
        proxy_set_header Digest $http_digest;
    }

    # Shared inbox
    location = /inbox {
        proxy_pass http://localhost:3001/inbox;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Signature $http_signature;
        proxy_set_header Date $http_date;
        proxy_set_header Digest $http_digest;
    }

    # Shared outbox
    location = /outbox {
        proxy_pass http://localhost:3001/outbox;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Link preview proxy
    location /link-preview {
        proxy_pass http://localhost:3001/link-preview;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # LiveKit API
    location /api/livekit/ {
        proxy_pass http://localhost:3001/api/livekit/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Federation API
    location /api/federation/ {
        proxy_pass http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Health check
    location /health {
        proxy_pass http://localhost:3001/health;
        proxy_http_version 1.1;
    }

    # Donation webhooks (Ko-fi, etc.)
    # Must be proxied before the SPA fallback below - otherwise the Vue
    # `index.html` is served and providers see HTML instead of JSON.
    location /webhooks/ {
        proxy_pass http://localhost:3001/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Ko-fi posts application/x-www-form-urlencoded; keep the body intact.
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;
        # Webhooks are small; tighter limit than the global 50M.
        client_max_body_size 64k;
    }

    # ==========================================================================
    # BULL BOARD - Queue Monitoring (Optional)
    # ==========================================================================
    # If enabled, Bull Board runs on a separate subdomain.
    # See dev/nginx-bullboard.template.conf for its nginx config.

    # ==========================================================================
    # BOT GATEWAY (Optional)
    # ==========================================================================

    location /bot-gateway/gateway {
        proxy_pass http://localhost:3002/gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /bot-gateway/ {
        proxy_pass http://localhost:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ==========================================================================
    # FRONTEND (Vue App)
    # ==========================================================================

    root /path/to/harmony/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # PWA: service worker and manifest must not be long-cached as immutable JS
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    location = /manifest.json {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Cache static assets (excludes /service-worker.js - matched above)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Max upload size
    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/harmony.access.log;
    error_log /var/log/nginx/harmony.error.log;
}

# =============================================================================
# LIVEKIT (Optional) - Separate subdomain for WebRTC
# =============================================================================
# Uncomment and configure if using LiveKit for voice/video

