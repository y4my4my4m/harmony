# =============================================================================
# Harmony Documentation Nginx Configuration Template
# =============================================================================
# Serves the VitePress documentation site at docs.YOUR_DOMAIN
#
# Copy this to nginx-docs.conf and replace placeholders:
#   - YOUR_DOMAIN: Your base domain (e.g., harmony.example.com)
#   - /path/to/harmony: Path to your Harmony installation
#
# Then:
#   sudo cp nginx-docs.conf /etc/nginx/sites-available/harmony-docs
#   sudo ln -s /etc/nginx/sites-available/harmony-docs /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d docs.YOUR_DOMAIN
#   sudo systemctl reload nginx
#
# Build docs first: npm run docs:generate-all
# =============================================================================

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name docs.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name docs.YOUR_DOMAIN;

    # Shared cert with main domain (certbot -d YOUR_DOMAIN -d docs.YOUR_DOMAIN)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /path/to/harmony/docs/.vitepress/dist;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/harmony-docs.access.log;
    error_log /var/log/nginx/harmony-docs.error.log;
}
