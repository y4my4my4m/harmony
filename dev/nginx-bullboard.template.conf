# =============================================================================
# Harmony Bull Board - Queue Monitoring Dashboard
# =============================================================================
# Proxies the Bull Board container (port 3003) behind HTTPS on a subdomain.
# Bull Board has its own HTTP basic auth (BULL_BOARD_USER / BULL_BOARD_PASSWORD).
#
# Setup:
#   1. Point a DNS A record for BULL_BOARD_DOMAIN to your server
#   2. sudo cp nginx-bullboard.conf /etc/nginx/sites-available/bullboard
#   3. sudo ln -s /etc/nginx/sites-available/bullboard /etc/nginx/sites-enabled/
#   4. sudo certbot --nginx -d BULL_BOARD_DOMAIN
#   5. sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    listen 80;
    server_name BULL_BOARD_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name BULL_BOARD_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/BULL_BOARD_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/BULL_BOARD_DOMAIN/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
