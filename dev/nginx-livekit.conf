# ============================================
# LIVEKIT SERVER (WebSocket for voice/video)
# ============================================
# For production, you need a separate subdomain for LiveKit WebSocket connections
# Run: certbot certonly -d live.mony.lol

server {
    listen 80;
    server_name live.mony.lol;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name live.mony.lol;

    ssl_certificate /etc/letsencrypt/live/live.mony.lol/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/live.mony.lol/privkey.pem;

    # WebSocket upgrade support
    location / {
        proxy_pass http://localhost:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    access_log /var/log/nginx/livekit.access.log;
    error_log /var/log/nginx/livekit.error.log;
}
