# Harmony - Updated for Federation Backend
# Replace your current /etc/nginx/sites-available/harmony with this

server {
    listen 80;
    server_name har.mony.lol;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name har.mony.lol;

    ssl_certificate /etc/letsencrypt/live/har.mony.lol/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/har.mony.lol/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/har.mony.lol/chain.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================
    # FEDERATION BACKEND (NEW!)
    # Changed from Edge Functions to Node.js backend
    # ============================================

    # WebFinger discovery
    location = /.well-known/webfinger {
        proxy_pass http://localhost:3001/.well-known/webfinger;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept $http_accept;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Accept, Content-Type";
        add_header Cache-Control "public, max-age=3600";
    }

    # host-meta (WebFinger discovery chain)
    location = /.well-known/host-meta {
        proxy_pass http://localhost:3001/.well-known/host-meta;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /.well-known/host-meta.json {
        proxy_pass http://localhost:3001/.well-known/host-meta.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=86400";
    }

    # NodeInfo discovery
    location = /.well-known/nodeinfo {
        proxy_pass http://localhost:3001/.well-known/nodeinfo;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
    }

    # NodeInfo 2.0 and 2.1
    location ~ ^/nodeinfo/2\.(0|1)$ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
    }

    # User Actor endpoints (inbox, outbox, followers, following, featured)
    # These always go to federation backend - no content negotiation needed
    location ~ ^/users/[^/]+/(inbox|outbox|followers|following|featured)$ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept $http_accept;
        proxy_set_header Content-Type $content_type;
        
        # ActivityPub signature headers (IMPORTANT!)
        proxy_set_header Signature $http_signature;
        proxy_set_header Date $http_date;
        proxy_set_header Digest $http_digest;
        
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Accept, Content-Type, Signature, Date, Digest";
        add_header Cache-Control "public, max-age=300";
    }


    # User Actor profile - Content negotiation between ActivityPub JSON and HTML
    # If Accept header contains activity+json or ld+json, serve from federation backend
    # Otherwise, redirect to frontend profile page for human viewing
    location ~ ^/users/([^/]+)$ {
        set $username $1;
        
        # Default to browser redirect
        set $target_action "redirect";
        
        # Check if this is an ActivityPub request (JSON Accept header)
        if ($http_accept ~* "application/activity\+json") {
            set $target_action "proxy";
        }
        if ($http_accept ~* "application/ld\+json") {
            set $target_action "proxy";
        }
        if ($http_accept ~* "application/json") {
            set $target_action "proxy";
        }
        
        # Browser requests get redirected to the frontend profile page
        if ($target_action = "redirect") {
            return 302 /social/profile/$username;
        }
        
        # ActivityPub clients get JSON from federation backend
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept $http_accept;
        proxy_set_header Content-Type $content_type;
        
        # ActivityPub signature headers
        proxy_set_header Signature $http_signature;
        proxy_set_header Date $http_date;
        proxy_set_header Digest $http_digest;
        
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Accept, Content-Type, Signature, Date, Digest";
        add_header Cache-Control "public, max-age=300";
    }

    # Bot Gateway WebSocket
    location /bot-gateway/gateway {
        proxy_pass http://localhost:3002/gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Bot Gateway Health Check
    location /bot-gateway/health {
        proxy_pass http://localhost:3002/health;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Bot Gateway - Bridged users
    location /bot-gateway/bridged-users/ {
        proxy_pass http://localhost:3002/bridged-users/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bot Gateway REST (api/v1, roles, channel overrides, etc.)
    # Keep the specific locations above this catch-all so WebSocket upgrade
    # headers and bridged-users routing stay explicit.
    location /bot-gateway/ {
        proxy_pass http://localhost:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Post endpoint - federation backend handles content negotiation:
    #  - ActivityPub clients (Accept: application/activity+json) → AP Note JSON
    #  - Browsers/crawlers → HTML page with OG meta tags for link previews
    location ~ ^/posts/([0-9a-f-]+)$ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept $http_accept;
        add_header Cache-Control "public, max-age=300";
    }

    # oEmbed endpoint for post embeds
    location = /oembed {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Donation webhooks (Ko-fi, etc.)
    # Must be proxied before the SPA fallback below - otherwise the Vue
    # `index.html` is served and providers see HTML instead of JSON.
    location /webhooks/ {
        proxy_pass http://localhost:3001/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;
        client_max_body_size 64k;
    }

    # Servers as ActivityPub Groups (NEW!)
    location ~ ^/servers/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept $http_accept;
        proxy_set_header Content-Type $content_type;
        
        # ActivityPub signature headers
        proxy_set_header Signature $http_signature;
        proxy_set_header Date $http_date;
        proxy_set_header Digest $http_digest;
        
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Accept, Content-Type, Signature, Date, Digest";
    }

    # Shared Inbox (standard location)
    location = /inbox {
        proxy_pass http://localhost:3001/inbox;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Accept $http_accept;
        
        # ActivityPub signature headers
        proxy_set_header Signature $http_signature;
        proxy_set_header Date $http_date;
        proxy_set_header Digest $http_digest;
        
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Accept, Content-Type, Signature, Date, Digest";
    }
    
    # Shared Outbox (standard location)
    location = /outbox {
        proxy_pass http://localhost:3001/outbox;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept $http_accept;
        
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Accept, Content-Type";
        add_header Cache-Control "public, max-age=300";
    }

    # Link preview proxy
    location /link-preview {
        proxy_pass http://localhost:3001/link-preview;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
    }

    # Federation API (internal use - user lookup, push notifications, etc.)
    location /api/federation/ {
        # Trailing slash strips /api/federation prefix before proxying
        proxy_pass http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Authorization $http_authorization;
    }

    # LiveKit API (WebRTC token generation)
    location /api/livekit/ {
        proxy_pass http://localhost:3001/api/livekit/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Authorization $http_authorization;
    }

    # NOTE: LiveKit WebSocket requires a separate server block for live.yourdomain.com
    # See the additional server block at the bottom of this file

    # ============================================
    # BULL BOARD - Queue Monitoring (Optional)
    # ============================================
    # If enabled, Bull Board runs on a separate subdomain.
    # See dev/nginx-bullboard.template.conf for its nginx config.

    # ============================================
    # FRONTEND (Vue App)
    # ============================================

    root /home/harmony/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    location = /manifest.json {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 50M;
    
    # Logs
    access_log /var/log/nginx/harmony.access.log;
    error_log /var/log/nginx/harmony.error.log;
}