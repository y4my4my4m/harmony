# Harmony Documentation - docs.mony.lol
# Serves the built VitePress documentation site
# Build docs first: npm run docs:generate-all

server {
    listen 80;
    server_name docs.mony.lol;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name docs.mony.lol;

    ssl_certificate /etc/letsencrypt/live/docs.mony.lol/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.mony.lol/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/docs.mony.lol/chain.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /home/harmony/docs/.vitepress/dist;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/harmony-docs.access.log;
    error_log /var/log/nginx/harmony-docs.error.log;
}
