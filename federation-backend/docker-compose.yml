version: "3.8"

services:
  federation-backend:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
    container_name: harmony-federation-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ./logs:/app/logs
    networks:
      - supabase_default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  supabase_default:
    external: true
