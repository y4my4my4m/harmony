<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <!-- Enhanced PWA Meta Tags -->

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">

  <!-- Enhanced Apple PWA Support -->

  <meta name="apple-mobile-web-app-title" content="Harmony">
  <meta name="apple-touch-fullscreen" content="yes">

  <!-- Enhanced Windows/Edge Support -->
  <meta name="msapplication-TileColor" content="#1e1f22">
  <meta name="msapplication-TileImage" content="/favicon/ms-icon-144x144.png">
  <meta name="msapplication-config" content="/browserconfig.xml">
  <meta name="msapplication-starturl" content="/">
  <meta name="msapplication-navbutton-color" content="#0EA5E9">

  <!-- Enhanced Social/SEO Meta -->
  <meta name="description" content="Harmony - Secure, federated chat application with end-to-end encryption">
  <meta name="keywords" content="chat, messaging, secure, e2ee, federated, discord alternative">
  <meta name="author" content="Harmony Team">

  <!-- Enhanced Favicon Support -->
  <link rel="apple-touch-icon" sizes="57x57" href="/favicon/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="/favicon/apple-icon-60x60.png">

  <link rel="apple-touch-icon" sizes="114x114" href="/favicon/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/favicon/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/favicon/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/favicon/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">

  <title>Harmony</title>

  <!-- Splash screen styles for better loading experience -->
  <style>
    #app-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1e1f22 0%, #2b2d31 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .loading-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      animation: logoFloat 3s ease-in-out infinite;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(88, 101, 242, 0.3);
    }

    .loading-text {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(45deg, #0EA5E9, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loading-subtitle {
      font-size: 14px;
      color: #b5bac1;
      margin-bottom: 32px;
      opacity: 0.8;
    }

    .loading-progress {
      width: 200px;
      height: 3px;
      background: #404249;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .loading-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #0EA5E9, #7c3aed);
      border-radius: 2px;
      animation: progressFill 2s ease-in-out infinite;
    }

    @keyframes logoFloat {

      0%,
      100% {
        transform: translateY(0px) scale(1);
        box-shadow: 0 8px 32px rgba(88, 101, 242, 0.3);
      }

      50% {
        transform: translateY(-10px) scale(1.05);
        box-shadow: 0 12px 40px rgba(88, 101, 242, 0.4);
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes progressFill {
      0% {
        transform: translateX(-100%);
      }

      50% {
        transform: translateX(0%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    /* Hide loading screen when app is ready */
    .app-ready #app-loading {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease-out;
    }

    /* Mobile optimizations */
    @media (max-width: 480px) {
      .loading-logo {
        width: 64px;
        height: 64px;
      }

      .loading-text {
        font-size: 20px;
      }

      .loading-progress {
        width: 160px;
      }
    }
  </style>
</head>
