<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <!-- Enhanced PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="transparent">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1e1f22">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="color-scheme" content="dark light">

  <!-- Enhanced Apple PWA Support -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Harmony">
  <meta name="apple-touch-fullscreen" content="yes">

  <!-- Enhanced Windows/Edge Support -->
  <meta name="msapplication-TileColor" content="#1e1f22">
  <meta name="msapplication-TileImage" content="/favicon/ms-icon-144x144.png">
  <meta name="msapplication-config" content="/browserconfig.xml">
  <meta name="msapplication-starturl" content="/">
  <meta name="msapplication-navbutton-color" content="#0EA5E9">

  <!-- Enhanced Social/SEO Meta -->
  <meta name="description" content="Harmony - Secure, federated chat application with end-to-end encryption">
  <meta name="keywords" content="chat, messaging, secure, e2ee, federated, discord alternative">
  <meta name="author" content="Harmony Team">

  <!-- Enhanced Favicon Support -->
  <link rel="apple-touch-icon" sizes="57x57" href="/favicon/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="/favicon/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="/favicon/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="/favicon/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="/favicon/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/favicon/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/favicon/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/favicon/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">

  <title>Harmony</title>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
