name: Tauri

on:
  push:
    branches: [master, tauri-implementation]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tauri-${{ github.ref }}
  cancel-in-progress: true

env:
  # Frontend needs Supabase vars at build; the native client picks the real
  # instance at runtime, so build-time placeholders are fine.
  VITE_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL != '' && secrets.TEST_SUPABASE_URL || 'https://placeholder.supabase.co' }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY != '' && secrets.TEST_SUPABASE_ANON_KEY || 'placeholder-key' }}

jobs:
  # Windows/macOS use webview WebRTC (WebView2 / WKWebView). native-media
  # (LiveKit/wgpu) is Linux-target-gated, so it is never pulled here.
  windows:
    name: Windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Build Windows installers
        run: npx tauri build --target x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: harmony-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error

  macos:
    name: macOS build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # Universal .dmg/.app. Unsigned: users must right-click > Open on first
      # launch (Gatekeeper). Notarization needs an Apple Developer cert (secrets).
      - name: Build macOS app
        run: npx tauri build --target universal-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: harmony-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 28.2.13676358
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;${NDK_VERSION}" "platforms;android-34" "build-tools;34.0.0"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Build debug APK
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/$NDK_VERSION"
          npx tauri android build --debug --target aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: harmony-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
