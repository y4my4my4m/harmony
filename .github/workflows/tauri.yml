name: Tauri

on:
  push:
    branches: [master, tauri-implementation]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tauri-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows build
    runs-on: windows-latest
    env:
      # native-media (LiveKit/wgpu) is Linux-only; Windows uses WebView2 WebRTC.
      # Frontend needs Supabase vars at build; the native client picks the real
      # instance at runtime, so build-time placeholders are fine.
      VITE_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL != '' && secrets.TEST_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY != '' && secrets.TEST_SUPABASE_ANON_KEY || 'placeholder-key' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Windows installers
        run: npx tauri build --target x86_64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: harmony-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error
