name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # Unit tests (fast, no external dependencies)
  # ----------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run test
        env:
          CI: true

  # ----------------------------------------------------------------
  # Federation backend tests
  # ----------------------------------------------------------------
  federation-tests:
    name: Federation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: federation-backend/package-lock.json

      - run: npm ci
        working-directory: federation-backend

      - run: npx vitest run
        working-directory: federation-backend
        env:
          CI: true

  # ----------------------------------------------------------------
  # Type checking
  # ----------------------------------------------------------------
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx vue-tsc --build --force

  # ----------------------------------------------------------------
  # Build verification
  # ----------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests, type-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key

  # ----------------------------------------------------------------
  # E2E tests (runs on PRs to main only to save resources)
  # ----------------------------------------------------------------
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npx playwright test --project=chromium
        env:
          CI: true
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key
